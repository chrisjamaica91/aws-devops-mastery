apiVersion: v1
kind: Service
metadata:
  name: javascript-api
  namespace: javascript-api
  labels:
    app: javascript-api
    tier: api
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"  # Future: If you add LoadBalancer
spec:
  type: ClusterIP  # Internal-only (not exposed to internet)
  selector:
    app: javascript-api
  ports:
  - name: http
    port: 80        # Other services can call javascript-api:80
    targetPort: 3000  # Routes to container port 3000
    protocol: TCP
  sessionAffinity: None  # No sticky sessions (stateless API)