apiVersion: v1
kind: Service
metadata:
  name: java-service
  namespace: java-service
  labels:
    app: java-service
    tier: backend
spec:
  type: ClusterIP
  selector:
    app: java-service
  ports:
  - name: http
    port: 80
    targetPort: 8080
    protocol: TCP
  sessionAffinity: None