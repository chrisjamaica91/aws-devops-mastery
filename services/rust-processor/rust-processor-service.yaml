apiVersion: v1
kind: Service
metadata:
  name: rust-processor
  namespace: rust-processor
  labels:
    app: rust-processor
    tier: processing
spec:
  type: ClusterIP
  selector:
    app: rust-processor
  ports:
  - name: http
    port: 80
    targetPort: 3000
    protocol: TCP
  sessionAffinity: None