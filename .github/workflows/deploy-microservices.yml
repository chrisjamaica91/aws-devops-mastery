name: Deploy Microservices

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'services/**'
      - '.github/workflows/deploy-microservices.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'services/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - production
      service:
        description: 'Service to deploy (or all)'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - javascript-api
          - java-service
          - rust-processor

env:
  AWS_REGION: us-east-2
  EKS_CLUSTER_NAME: aws-devops-mastery-dev
  ECR_REGISTRY: 737026300147.dkr.ecr.us-east-2.amazonaws.com
  ECR_REPOSITORY_PREFIX: aws-devops-mastery

# OIDC permissions for AWS authentication
permissions:
  id-token: write
  contents: read

jobs:
  # Job 1: Detect which services changed
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      javascript: ${{ steps.filter.outputs.javascript }}
      java: ${{ steps.filter.outputs.java }}
      rust: ${{ steps.filter.outputs.rust }}
    steps:
      - uses: actions/checkout@v4
      
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            javascript:
              - 'services/javascript-api/**'
            java:
              - 'services/java-service/**'
            rust:
              - 'services/rust-processor/**'

  # Job 2: Build and Push JavaScript API
  build-javascript:
    name: Build JavaScript API
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.javascript == 'true' || github.event.inputs.service == 'all' || github.event.inputs.service == 'javascript-api'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: services/javascript-api/package-lock.json
      
      - name: Install dependencies
        working-directory: services/javascript-api
        run: npm ci
      
      - name: Run tests (if exists)
        working-directory: services/javascript-api
        run: npm test --if-present
      
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::737026300147:role/GitHubActionsRole
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Build and push Docker image
        working-directory: services/javascript-api
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY_PREFIX }}/javascript-api:$IMAGE_TAG .
          docker tag ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY_PREFIX }}/javascript-api:$IMAGE_TAG \
                     ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY_PREFIX }}/javascript-api:latest
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY_PREFIX }}/javascript-api:$IMAGE_TAG
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY_PREFIX }}/javascript-api:latest
      
      - name: Update Kubernetes deployment
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER_NAME }}
          kubectl set image deployment/javascript-api \
            javascript-api=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY_PREFIX }}/javascript-api:${{ github.sha }} \
            -n javascript-api
          kubectl rollout status deployment/javascript-api -n javascript-api --timeout=5m

  # Job 3: Build and Push Java Service
  build-java:
    name: Build Java Service
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.java == 'true' || github.event.inputs.service == 'all' || github.event.inputs.service == 'java-service'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
      
      - name: Build with Maven
        working-directory: services/java-service
        run: mvn clean package -DskipTests
      
      - name: Run tests
        working-directory: services/java-service
        run: mvn test
      
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::737026300147:role/GitHubActionsRole
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Build and push Docker image
        working-directory: services/java-service
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY_PREFIX }}/java-service:$IMAGE_TAG .
          docker tag ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY_PREFIX }}/java-service:$IMAGE_TAG \
                     ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY_PREFIX }}/java-service:latest
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY_PREFIX }}/java-service:$IMAGE_TAG
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY_PREFIX }}/java-service:latest
      
      - name: Update Kubernetes deployment
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER_NAME }}
          kubectl set image deployment/java-service \
            java-service=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY_PREFIX }}/java-service:${{ github.sha }} \
            -n java-service
          kubectl rollout status deployment/java-service -n java-service --timeout=5m

  # Job 4: Build and Push Rust Processor
  build-rust:
    name: Build Rust Processor
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.rust == 'true' || github.event.inputs.service == 'all' || github.event.inputs.service == 'rust-processor'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('services/rust-processor/Cargo.lock') }}
      
      - name: Cache Cargo build
        uses: actions/cache@v4
        with:
          path: services/rust-processor/target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('services/rust-processor/Cargo.lock') }}
      
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::737026300147:role/GitHubActionsRole
          aws-region: ${{ env.AWS_REGION }}
      
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
      
      - name: Build and push Docker image
        working-directory: services/rust-processor
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY_PREFIX }}/rust-processor:$IMAGE_TAG .
          docker tag ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY_PREFIX }}/rust-processor:$IMAGE_TAG \
                     ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY_PREFIX }}/rust-processor:latest
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY_PREFIX }}/rust-processor:$IMAGE_TAG
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY_PREFIX }}/rust-processor:latest
      
      - name: Update Kubernetes deployment
        run: |
          aws eks update-kubeconfig --region ${{ env.AWS_REGION }} --name ${{ env.EKS_CLUSTER_NAME }}
          kubectl set image deployment/rust-processor \
            rust-processor=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY_PREFIX }}/rust-processor:${{ github.sha }} \
            -n rust-processor
          kubectl rollout status deployment/rust-processor -n rust-processor --timeout=5m